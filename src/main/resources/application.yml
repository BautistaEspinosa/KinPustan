server:
  port: 8080

spring:
  application:
    name: Kinpustan
  datasource:
    url: jdbc:h2:mem:kinpustan_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
springdoc:
  swagger-ui:
    path: /api-docs
    tags-sorter: alpha